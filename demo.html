<script type="application/json" id="demo-embedded-exam">{"id":"de_B1","lang":"de","level":"B1","topic":"Arbeit und Umwelt","board":"Goethe-Institut","certificate":"Goethe-Zertifikat B1","passPercent":60,"modules":[{"id":"lesen","title":"Lesen","interactive":true,"parts":[{"type":"multiple_choice","label":"Teil 1","instructions":"Lesen Sie den Text und wählen Sie die richtige Antwort (A, B oder C).","passage":"Immer mehr Menschen in Deutschland engagieren sich in ihrer Freizeit ehrenamtlich. Sie helfen zum Beispiel in Sportvereinen, in der Nachbarschaft oder bei der Betreuung älterer Menschen, die allein leben. Eine aktuelle Studie zeigt, dass vor allem jüngere Leute ein Ehrenamt übernehmen möchten, ihnen aber oft die nötige Zeit fehlt. Viele Organisationen reagieren darauf und bieten heute flexiblere Aufgaben an, die man auch von zu Hause aus erledigen kann, etwa eine Webseite betreuen oder Veranstaltungen online organisieren. Fachleute betonen, dass freiwillige Arbeit nicht nur der Gesellschaft nützt, sondern auch den Helfenden selbst: Sie lernen neue Fähigkeiten, knüpfen Kontakte und fühlen sich gebraucht. Wichtig sei jedoch, dass sich niemand überfordert. Wer sich engagiert, sollte klare Grenzen setzen und auf die eigene Gesundheit achten.","markableWords":[{"word":"Ehrenamt","gender":"n","pos":"noun","translations":{"en":"voluntary work","es":"voluntariado"}},{"word":"Nachbarschaft","gender":"f","pos":"noun","translations":{"en":"neighbourhood","es":"vecindario"}},{"word":"Gesundheit","gender":"f","pos":"noun","translations":{"en":"health","es":"salud"}}],"items":[{"id":"de_B1_l1q1","question":"Was zeigt die Studie über jüngere Leute?","options":[{"key":"A","text":"Sie haben kein Interesse am Ehrenamt.","correct":false},{"key":"B","text":"Sie möchten helfen, haben aber oft wenig Zeit.","correct":true},{"key":"C","text":"Sie engagieren sich nur online.","correct":false}]},{"id":"de_B1_l1q2","question":"Was empfehlen die Fachleute?","options":[{"key":"A","text":"Möglichst viele Aufgaben zu übernehmen.","correct":false},{"key":"B","text":"Klare Grenzen zu setzen und auf die Gesundheit zu achten.","correct":true},{"key":"C","text":"Nur von zu Hause aus zu arbeiten.","correct":false}]},{"id":"de_B1_l1tf","format":"true_false","question":"Laut den Fachleuten nützt freiwillige Arbeit auch den Helfenden selbst.","options":[{"key":"R","text":"Richtig","correct":true},{"key":"F","text":"Falsch","correct":false}]}]},{"type":"true_false","label":"Teil 2","instructions":"Lesen Sie die Sätze. Entscheiden Sie: richtig oder falsch?","passage":"Ein Bericht der Umweltagentur empfiehlt, dass Firmen Energieverbrauch in Büros messen und jährlich veröffentlichen. Kritiker sagen, dass kleine Betriebe die Kosten nicht tragen können. Dennoch unterstützen viele Kommunen Pilotprojekte mit Zuschüssen.","markableWords":[{"word":"Energieverbrauch","gender":"m","pos":"noun","translations":{"en":"energy consumption","es":"consumo de energía"}}],"items":[{"id":"l2q1","question":"Der Bericht empfiehlt, Energieverbrauch zu messen.","options":[{"key":"A","text":"Richtig","correct":true},{"key":"B","text":"Falsch","correct":false}]}]},{"type":"multiple_choice","label":"Teil 3","instructions":"Lesen Sie den Blogeintrag und wählen Sie die beste Antwort.","passage":"Seit ich dreimal pro Woche im Homeoffice arbeite, habe ich mehr Zeit für Sport. Mein Chef war anfangs skeptisch, doch die Produktivität ist gleich geblieben. Wichtig ist eine stabile Internetverbindung und ein ruhiger Arbeitsplatz zu Hause.","markableWords":[{"word":"Internetverbindung","gender":"f","pos":"noun","translations":{"en":"internet connection","es":"conexión a internet"}}],"items":[{"id":"l3q1","question":"Was hat sich für die Autorin verbessert?","options":[{"key":"A","text":"Sie hat mehr Zeit für Sport.","correct":true},{"key":"B","text":"Sie verdient deutlich mehr Geld.","correct":false},{"key":"C","text":"Sie muss nie wieder ins Büro.","correct":false}]}]}]},{"id":"horen","title":"Hören","interactive":true,"parts":[{"type":"multiple_choice","label":"Teil 1","instructions":"Lesen Sie das Transkript und wählen Sie die richtige Antwort.","transcript":"Moderatorin: Heute sprechen wir über Carsharing in der Stadt. Unser Gast, Herr Weber, nutzt kein eigenes Auto mehr.\nHerr Weber: Ich spare nicht nur Geld, sondern auch Parkplatzsuche. Allerdings brauche ich morgens manchmal länger, bis ein Fahrzeug frei ist.","markableWords":[{"word":"Fahrzeug","gender":"n","pos":"noun","translations":{"en":"vehicle","es":"vehículo"}}],"items":[{"id":"h1q1","question":"Welchen Nachteil nennt Herr Weber?","options":[{"key":"A","text":"Carsharing ist zu teuer.","correct":false},{"key":"B","text":"Morgens wartet er manchmal auf ein freies Auto.","correct":true},{"key":"C","text":"Er findet keine Parkplätze.","correct":false}]}]},{"type":"multiple_choice","label":"Teil 2","instructions":"Hören Sie das Gespräch (Transkript) und antworten Sie.","transcript":"Kollegin: Hast du die Einladung zum Team-Workshop gesehen?\nKollege: Ja, aber ich kann am Freitag nicht. Ich schlage vor, den Termin auf Montag zu verschieben.\nKollegin: Gute Idee. Ich informiere die Leitung.","markableWords":[{"word":"Workshop","gender":"m","pos":"noun","translations":{"en":"workshop","es":"taller"}}],"items":[{"id":"h2q1","question":"Was schlägt der Kollege vor?","options":[{"key":"A","text":"Den Workshop abzusagen","correct":false},{"key":"B","text":"Den Termin auf Montag zu verschieben","correct":true},{"key":"C","text":"Eine neue Einladung zu drucken","correct":false}]},{"id":"h2q2","question":"Wer informiert die Leitung über den neuen Termin?","options":[{"key":"A","text":"Der Kollege","correct":false},{"key":"B","text":"Die Kollegin","correct":true},{"key":"C","text":"Die Leitung selbst","correct":false}]}]}]},{"id":"schreiben","title":"Schreiben","interactive":false,"parts":[{"type":"opinion_email","task":"Sie haben in einer Zeitschrift einen Artikel über Plastikmüll im Meer gelesen. Schreiben Sie einen Leserbrief an die Redaktion: Was Sie beunruhigt und welche Maßnahmen Sie vorschlagen.","note":"ca. 80 Wörter — Graded with feedback in the full app."}]},{"id":"sprechen","title":"Sprechen","interactive":false,"parts":[{"type":"presentation","task":"Erzählen Sie von einer Reise, die Sie gemacht haben: Ziel, Transport, Erlebnis und ob Sie die Reise empfehlen würden.","note":"Vorbereitungszeit: 1 Minute — Evaluated with AI in the full app."}]}]}</script>
<script>
(function(){
  'use strict';

  var VOCAB_KEY = 'lexicoil_demo_vocab';
  var LANGS = {
    de: { name: 'Goethe', flag: '🇩🇪', board: 'Goethe-Institut' },
    en: { name: 'Cambridge', flag: '🇬🇧', board: 'Cambridge English' },
    es: { name: 'DELE', flag: '🇪🇸', board: 'Instituto Cervantes' }
  };
  var LEVELS = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
  var TR_LANG = 'en';

  var BRUSH = {
    en: {
      cert: 'Cambridge B1 Preliminary',
      q: 'Which activity does the writer enjoy most on weekends?',
      answer: 'B) Walking in the park with friends'
    },
    es: {
      cert: 'DELE B1',
      q: '¿Qué recomienda el artículo sobre el transporte urbano?',
      answer: 'C) Usar la bicicleta para trayectos cortos'
    }
  };

  var SKILL = {
    de: {
      bars: [
        { label: 'Lesen', pct: 80, tone: 'good' },
        { label: 'Hören', pct: 55, tone: 'weak' },
        { label: 'Wortschatz', pct: 60, tone: 'mid' },
        { label: 'Grammatik', pct: 52, tone: 'mid' }
      ],
      plan: [
        { day: 'Mon', text: 'Hören Teil 2 — Monologe (schwach)', tag: 'weak' },
        { day: 'Tue', text: 'Lesen Teil 3 — Anzeigen (Wiederholung)', tag: 'review' },
        { day: 'Wed', text: 'Hören Teil 3 — Gespräche (schwach)', tag: 'weak' },
        { day: 'Thu', text: 'Flashcards — gespeicherte Wörter', tag: 'review' },
        { day: 'Fri', text: 'Mixed exam · 70% Schwächen', tag: 'weak' }
      ]
    },
    en: {
      bars: [
        { label: 'Reading', pct: 78, tone: 'good' },
        { label: 'Listening', pct: 58, tone: 'weak' },
        { label: 'Vocabulary', pct: 62, tone: 'mid' },
        { label: 'Grammar', pct: 50, tone: 'weak' }
      ],
      plan: [
        { day: 'Mon', text: 'Listening Part 2 — monologues', tag: 'weak' },
        { day: 'Tue', text: 'Vocab review — saved words', tag: 'review' },
        { day: 'Wed', text: 'Use of English — weak tags', tag: 'weak' }
      ]
    },
    es: {
      bars: [
        { label: 'Comprensión lectora', pct: 82, tone: 'good' },
        { label: 'Comprensión auditiva', pct: 54, tone: 'weak' },
        { label: 'Vocabulario', pct: 61, tone: 'mid' },
        { label: 'Gramática', pct: 48, tone: 'weak' }
      ],
      plan: [
        { day: 'Lun', text: 'Audición — diálogos cortos', tag: 'weak' },
        { day: 'Mar', text: 'Repaso de vocabulario guardado', tag: 'review' }
      ]
    }
  };

  var MASTERY = {
    de: [
      { label: 'Passiv', pct: 68, tone: 'good' },
      { label: 'Konjunktiv II', pct: 52, tone: 'mid' },
      { label: 'Relativsätze', pct: 43, tone: 'weak' }
    ],
    en: [
      { label: 'Passive', pct: 68, tone: 'good' },
      { label: 'Conditionals', pct: 52, tone: 'mid' },
      { label: 'Reported speech', pct: 43, tone: 'weak' }
    ],
    es: [
      { label: 'Voz pasiva', pct: 68, tone: 'good' },
      { label: 'Condicional', pct: 52, tone: 'mid' },
      { label: 'Subjuntivo', pct: 43, tone: 'weak' }
    ]
  };

  var state = {
    view: 'pick',
    lang: 'de',
    level: 'B1',
    exam: null,
    answers: {},
    checked: false,
    popWord: null,
    popTrLang: TR_LANG,
    fcFlipped: false,
    revealed: {},
    taskRevealed: {}
  };

  var root = document.getElementById('root');
  var badge = document.getElementById('badgeLabel');

  function esc(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function isOpenCell(lang, level){
    return lang === 'de' && level === 'B1';
  }

  function loadEmbeddedExam(){
    var el = document.getElementById('demo-embedded-exam');
    if (!el) throw new Error('Embedded exam missing');
    return JSON.parse(el.textContent);
  }

  function loadVocab(){
    try {
      var raw = localStorage.getItem(VOCAB_KEY);
      var list = raw ? JSON.parse(raw) : [];
      return Array.isArray(list) ? list : [];
    } catch (_) { return []; }
  }

  function isWordSaved(word, lang){
    var k = lang + '|' + word.toLowerCase();
    return loadVocab().some(function(v){ return v.lang + '|' + v.word.toLowerCase() === k; });
  }

  function saveWord(entry){
    var list = loadVocab();
    var k = entry.lang + '|' + entry.word.toLowerCase();
    if (list.some(function(v){ return v.lang + '|' + v.word.toLowerCase() === k; })) return false;
    list.unshift(entry);
    try { localStorage.setItem(VOCAB_KEY, JSON.stringify(list)); } catch (_) {}
    return true;
  }

  function artFor(lang, gender){
    var g = String(gender || '').toLowerCase();
    if (lang === 'de') {
      if (g === 'm' || g === 'masc' || g === 'masculine' || g === 'der') return 'der';
      if (g === 'f' || g === 'fem' || g === 'feminine' || g === 'die') return 'die';
      if (g === 'n' || g === 'neut' || g === 'neuter' || g === 'das') return 'das';
    }
    if (lang === 'es') {
      if (g === 'm' || g === 'masc' || g === 'masculine' || g === 'el') return 'el';
      if (g === 'f' || g === 'fem' || g === 'feminine' || g === 'la') return 'la';
    }
    return '';
  }

  function artClass(art){
    if (art === 'der' || art === 'el') return 'demo-art--masc';
    if (art === 'die' || art === 'la') return 'demo-art--fem';
    if (art === 'das') return 'demo-art--neut';
    return '';
  }

  function speakWord(word, lang){
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    var loc = lang === 'de' ? 'de-DE' : lang === 'es' ? 'es-ES' : 'en-GB';
    var u = new SpeechSynthesisUtterance(word);
    u.lang = loc;
    u.rate = 0.88;
    window.speechSynthesis.speak(u);
  }

  function moduleById(exam, id){
    return (exam.modules || []).find(function(m){ return m.id === id; }) || null;
  }

  function readingPart(exam){
    var mod = moduleById(exam, 'lesen');
    return mod && mod.parts && mod.parts[0] ? mod.parts[0] : null;
  }

  function itemFormat(item, part){
    if (item.format === 'true_false' || item.format === 'multiple_choice') return item.format;
    if (part.format === 'true_false' || part.format === 'multiple_choice') return part.format;
    if (part.type === 'true_false') return 'true_false';
    return 'multiple_choice';
  }

  function parseQuery(){
    var p = new URLSearchParams(location.search);
    if (LANGS[p.get('lang')]) state.lang = p.get('lang');
    var lv = (p.get('level') || '').toUpperCase();
    if (LEVELS.indexOf(lv) >= 0) state.level = lv;
    if (!isOpenCell(state.lang, state.level)) {
      state.lang = 'de';
      state.level = 'B1';
    }
  }

  function setUrl(){
    var q = state.view === 'demo' ? ('?lang=' + state.lang + '&level=' + state.level) : '';
    try { history.replaceState(null, '', location.pathname + q); } catch (_) {}
  }

  function sampleWord(exam){
    var vocab = loadVocab().filter(function(v){ return v.lang === exam.lang; });
    if (vocab.length) return vocab[0];
    var part = readingPart(exam);
    if (part && part.markableWords && part.markableWords[0]) {
      var w = part.markableWords[0];
      return { word: w.word, lang: exam.lang, gender: w.gender, translations: w.translations };
    }
    return { word: 'word', lang: exam.lang, translations: { en: 'translation' } };
  }

  function wordTr(entry, lang){
    if (!entry || !entry.translations) return '—';
    return entry.translations[lang] || entry.translations.en || Object.values(entry.translations)[0] || '—';
  }

  function passageHtml(text, markable, lang){
    if (!text) return '';
    var saved = loadVocab();
    var marks = (markable || []).slice().sort(function(a, b){
      return text.indexOf(b.word) - text.indexOf(a.word);
    });
    var chunks = [];
    var pos = 0;
    marks.forEach(function(m){
      var i = text.indexOf(m.word, pos);
      if (i < 0) return;
      if (i > pos) chunks.push({ t: 'text', v: text.slice(pos, i) });
      var isSaved = saved.some(function(v){ return v.lang === lang && v.word.toLowerCase() === m.word.toLowerCase(); });
      chunks.push({ t: 'word', v: m.word, meta: m, saved: isSaved });
      pos = i + m.word.length;
    });
    if (pos < text.length) chunks.push({ t: 'text', v: text.slice(pos) });
    return chunks.map(function(c){
      if (c.t === 'text') return esc(c.v);
      var cls = 'w' + (c.saved ? ' saved' : '') + (state.popWord === c.v ? ' active' : '');
      return '<span class="' + cls + '" data-word="' + esc(c.v) + '" role="button" tabindex="0" aria-label="Translate ' + esc(c.v) + '">' + esc(c.v) + '</span>';
    }).join('');
  }

  function stepHeader(n, title){
    return '<div class="loop-step" aria-hidden="true"><span class="n">' + n + '</span>' + esc(title) + '</div>';
  }

  function renderPick(){
    state.view = 'pick';
    badge.textContent = 'Demo · offline · no account';
    setUrl();
    var langChips = Object.keys(LANGS).map(function(code){
      var avail = code === 'de';
      return '<button type="button" class="chip' + (state.lang === code ? ' on' : '') + '" data-lang="' + code + '">' +
        LANGS[code].flag + ' ' + esc(LANGS[code].name) + (avail ? '' : ' <span class="chip-soon">Soon</span>') + '</button>';
    }).join('');
    var lvlBtns = LEVELS.map(function(lv){
      var open = isOpenCell(state.lang, lv);
      var cls = 'chip' + (state.level === lv ? ' on' : '') + (open ? '' : ' chip--locked');
      var soon = open ? '' : ' <span class="chip-soon">Soon</span>';
      return '<button type="button" class="' + cls + '" data-level="' + lv + '"' + (open ? '' : ' disabled aria-disabled="true"') + '>' + lv + soon + '</button>';
    }).join('');
    var canStart = isOpenCell(state.lang, state.level);
    root.innerHTML =
      '<div class="demo-intro">' +
        '<h1 class="h1">Try LexiCoil — the full learning loop</h1>' +
        '<p class="lede">Simulate official exams (Goethe, Cambridge, DELE), save vocabulary from real texts, turn your words into personalised practice, and get a weakness plan — preview it all offline, no account.</p>' +
        '<ol class="demo-loop-outline">' +
          '<li>Take an official-format exam</li>' +
          '<li>Save words to your vocabulary</li>' +
          '<li>Generate practice from your words</li>' +
          '<li>See where you struggle · 70/30 plan</li>' +
        '</ol>' +
      '</div>' +
      '<div class="card">' +
        '<p class="seclbl">Certification</p>' +
        '<div class="chips">' + langChips + '</div>' +
        '<p class="seclbl" style="margin-top:14px">Level</p>' +
        '<div class="level-grid">' + lvlBtns + '</div>' +
        '<button type="button" class="btn btn-primary btn-block" id="btnStart"' + (canStart ? '' : ' disabled') + '>Start demo →</button>' +
        (canStart ? '' : '<p class="note" style="margin-top:10px">Full interactive preview: <strong>German B1 (Goethe)</strong>. Other certifications and levels coming soon.</p>') +
      '</div>' +
      '<p class="note">100% offline preview · sample content only · the live app syncs progress to your account.</p>';
    root.querySelectorAll('[data-lang]').forEach(function(btn){
      btn.addEventListener('click', function(){
        state.lang = btn.dataset.lang;
        if (!isOpenCell(state.lang, state.level)) state.level = 'B1';
        renderPick();
      });
    });
    root.querySelectorAll('[data-level]').forEach(function(btn){
      if (btn.disabled) return;
      btn.addEventListener('click', function(){ state.level = btn.dataset.level; renderPick(); });
    });
    var startBtn = document.getElementById('btnStart');
    if (startBtn) startBtn.addEventListener('click', startDemo);
  }

  function startDemo(){
    if (!isOpenCell(state.lang, state.level)) return;
    try {
      state.exam = loadEmbeddedExam();
      state.view = 'demo';
      state.answers = {};
      state.checked = false;
      state.popWord = null;
      state.popTrLang = TR_LANG;
      state.fcFlipped = false;
      state.revealed = {};
      state.taskRevealed = {};
      badge.textContent = 'Demo · ' + LANGS[state.exam.lang].name + ' ' + state.exam.level;
      setUrl();
      renderDemo();
    } catch (err) {
      root.innerHTML = '<p class="err">Demo data error. <button type="button" class="btn btn-secondary" id="btnRetry">Back</button></p>';
      document.getElementById('btnRetry').addEventListener('click', renderPick);
    }
  }

  function renderRevealItem(item, part, idx){
    var fmt = itemFormat(item, part);
    var correct = (item.options || []).find(function(o){ return o.correct; });
    var revealed = state.revealed[item.id];
    var opts = (item.options || []).map(function(o){
      return '<div class="demo-opt demo-opt--static">' +
        (fmt === 'multiple_choice' ? esc(o.key) + ') ' : '') + esc(o.text) + '</div>';
    }).join('');
    return '<div class="demo-q">' +
      '<p class="qtxt"><span class="demo-q-n">' + (idx + 1) + '.</span> ' + esc(item.question) + '</p>' +
      '<div class="demo-opts' + (fmt === 'true_false' ? ' demo-opts--tf' : '') + ' demo-opts--static">' + opts + '</div>' +
      (revealed && correct ?
        '<p class="demo-reveal">Answer: <b>' + (fmt === 'multiple_choice' ? esc(correct.key) + ') ' : '') + esc(correct.text) + '</b></p>' :
        '<button type="button" class="btn btn-secondary demo-reveal-btn" data-reveal="' + esc(item.id) + '" aria-label="Reveal answer">Reveal answer</button>') +
    '</div>';
  }

  function renderSectionB(exam){
    var lesen = moduleById(exam, 'lesen');
    var horen = moduleById(exam, 'horen');
    var schreiben = moduleById(exam, 'schreiben');
    var sprechen = moduleById(exam, 'sprechen');
    var html = stepHeader('B', 'Simulate an official exam') +
      '<p class="note demo-sec-sub">Sample tasks from each skill — same layout as the live exam. Tap <em>Reveal answer</em> to check.</p>';

    if (lesen && lesen.parts) {
      html += '<div class="demo-skill-block card"><p class="seclbl">' + esc(lesen.title) + '</p>';
      lesen.parts.slice(0, 2).forEach(function(part){
        html += '<p class="demo-skill-teil">' + esc(part.label || '') + '</p>';
        if (part.passage) {
          html += '<div class="passage demo-passage demo-passage--sample">' + esc(part.passage.slice(0, 220)) + (part.passage.length > 220 ? '…' : '') + '</div>';
        }
        (part.items || []).slice(0, 2).forEach(function(item, i){ html += renderRevealItem(item, part, i); });
      });
      html += '</div>';
    }

    if (horen && horen.parts) {
      html += '<div class="demo-skill-block card"><p class="seclbl">' + esc(horen.title) + '</p>';
      horen.parts.forEach(function(part){
        html += '<p class="demo-skill-teil">' + esc(part.label || '') + '</p>';
        if (part.transcript) {
          html += '<div class="demo-transcript" aria-label="Listening transcript sample">' + esc(part.transcript) + '</div>';
        }
        (part.items || []).slice(0, 2).forEach(function(item, i){ html += renderRevealItem(item, part, i); });
      });
      html += '</div>';
    }

    function renderTask(mod, part, key, sampleAnswer){
      if (!mod || !part) return '';
      var rid = key;
      var revealed = state.taskRevealed[rid];
      return '<div class="demo-skill-block card"><p class="seclbl">' + esc(mod.title) + '</p>' +
        '<p class="demo-task">' + esc(part.task || part.instructions || '') + '</p>' +
        (part.note ? '<p class="note">' + esc(part.note) + '</p>' : '') +
        (revealed ?
          '<p class="demo-reveal demo-task-sample">' + sampleAnswer + '</p>' :
          '<button type="button" class="btn btn-secondary demo-reveal-btn" data-task-reveal="' + esc(rid) + '">Reveal sample approach</button>') +
      '</div>';
    }

    html += renderTask(schreiben, schreiben && schreiben.parts && schreiben.parts[0], 'schreiben',
      '<b>Sample opening:</b> „Sehr geehrte Damen und Herren, ich habe Ihren Artikel über Plastikmüll gelesen und bin beunruhigt…“');
    html += renderTask(sprechen, sprechen && sprechen.parts && sprechen.parts[0], 'sprechen',
      '<b>Sample structure:</b> Ziel nennen → Transport → Highlight → Empfehlung (ca. 1–2 Minuten).');

    html += '<div class="demo-brush card">' +
      '<p class="seclbl">Also in English &amp; Spanish</p>' +
      '<p class="demo-brush-row"><span class="demo-brush-flag">🇬🇧</span> <b>' + esc(BRUSH.en.cert) + '</b> — ' + esc(BRUSH.en.q) +
      ' <span class="demo-brush-ans">→ ' + esc(BRUSH.en.answer) + '</span></p>' +
      '<p class="demo-brush-row"><span class="demo-brush-flag">🇪🇸</span> <b>' + esc(BRUSH.es.cert) + '</b> — ' + esc(BRUSH.es.q) +
      ' <span class="demo-brush-ans">→ ' + esc(BRUSH.es.answer) + '</span></p>' +
      '<p class="note" style="margin:8px 0 0">Same loop in the full app for Cambridge and DELE.</p></div>';

    return html;
  }

  function getMarkable(word){
    var part = readingPart(state.exam);
    if (!part || !part.markableWords) return null;
    return part.markableWords.find(function(m){ return m.word === word; }) || null;
  }

  function renderWordPop(){
    if (!state.popWord) return '';
    var meta = getMarkable(state.popWord);
    if (!meta) return '';
    var langs = Object.keys(meta.translations || {});
    var toggle = langs.map(function(code){
      return '<button type="button" class="demo-tr-chip' + (state.popTrLang === code ? ' on' : '') + '" data-trlang="' + code + '">' + code.toUpperCase() + '</button>';
    }).join('');
    var tr = wordTr(meta, state.popTrLang);
    var saved = isWordSaved(meta.word, state.exam.lang);
    return '<div class="demo-pop card" id="demoPop">' +
      '<p class="demo-pop-word"><b>' + esc(meta.word) + '</b></p>' +
      '<div class="demo-tr-toggle">' + toggle + '</div>' +
      '<p class="demo-pop-tr">' + esc(tr) + '</p>' +
      '<button type="button" class="btn btn-primary btn-block" id="btnSaveWord"' + (saved ? ' disabled' : '') + '>' +
        (saved ? '✓ Saved' : 'Save to vocabulary') + '</button>' +
      '<button type="button" class="btn btn-secondary btn-block" id="btnClosePop" style="margin-top:8px">Close</button>' +
    '</div>';
  }

  function renderVocabList(exam){
    var vocab = loadVocab().filter(function(v){ return v.lang === exam.lang; });
    if (!vocab.length) {
      return '<p class="note">Tap highlighted words in the passage below to save them here.</p>';
    }
    return '<div class="demo-vocab-list">' + vocab.map(function(v){
      var art = artFor(v.lang, v.gender);
      var artHtml = art ? '<span class="demo-art ' + artClass(art) + '">' + esc(art) + '</span>' : '';
      var tr = wordTr(v, TR_LANG);
      return '<div class="demo-vocab-row">' + artHtml + '<b>' + esc(v.word) + '</b><span>' + esc(tr) + '</span></div>';
    }).join('') + '</div>';
  }

  function renderSectionC(exam){
    var part = readingPart(exam);
    if (!part) return '';
    return stepHeader('C', 'Save your vocabulary') +
      '<p class="note demo-sec-sub">Tap any highlighted word for translations in EN/ES — then save it to your deck.</p>' +
      '<div class="card demo-reading">' +
        '<p class="seclbl">' + esc(moduleById(exam, 'lesen').title) + ' · ' + esc(part.label || 'Teil 1') + '</p>' +
        '<div class="passage demo-passage">' + passageHtml(part.passage, part.markableWords, exam.lang) + '</div>' +
        (state.popWord ? renderWordPop() : '<p class="note demo-tap-hint">Tap highlighted words to translate and save.</p>') +
      '</div>' +
      '<div class="card demo-vocab-sec">' +
        '<p class="seclbl">Your vocabulary · ' + loadVocab().filter(function(v){ return v.lang === exam.lang; }).length + ' saved</p>' +
        renderVocabList(exam) +
      '</div>';
  }

  function practiceGap(exam, sample){
    var w = sample.word;
    var tr = wordTr(sample, TR_LANG);
    if (exam.lang === 'de') return 'Ich engagiere mich im <span class="loop-gap">___</span>. <span class="loop-reveal">→ ' + esc(w) + '</span>';
    if (exam.lang === 'es') return 'Me interesa el <span class="loop-gap">___</span>. <span class="loop-reveal">→ ' + esc(w) + '</span>';
    return 'Many students value a good <span class="loop-gap">___</span>. <span class="loop-reveal">→ ' + esc(w) + '</span>';
  }

  function practicePhrase(exam, sample){
    var w = sample.word;
    if (exam.lang === 'de') return '„Ich möchte ein ' + esc(w) + ' übernehmen."';
    if (exam.lang === 'es') return '«Me gustaría hacer un ' + esc(w) + ' en mi barrio.»';
    return '"I would like to improve my ' + esc(w) + ' this year."';
  }

  function practiceMatch(exam){
    var vocab = loadVocab().filter(function(v){ return v.lang === exam.lang; });
    var pairs = vocab.length >= 2 ? vocab.slice(0, 2) : [];
    if (pairs.length < 2) {
      var part = readingPart(exam);
      pairs = (part && part.markableWords) ? part.markableWords.slice(0, 2).map(function(w){
        return { word: w.word, translations: w.translations, lang: exam.lang };
      }) : [];
    }
    if (pairs.length < 2) return '<span class="note">Save two words in section C to see a match preview.</span>';
    return pairs.map(function(p){
      return '<span class="demo-match-pair"><b>' + esc(p.word) + '</b> ⇄ ' + esc(wordTr(p, TR_LANG)) + '</span>';
    }).join('<span class="demo-match-sep"> · </span>');
  }

  function renderSectionD(exam){
    var sample = sampleWord(exam);
    var art = artFor(sample.lang, sample.gender);
    var artHtml = art ? '<span class="demo-art ' + artClass(art) + '">' + esc(art) + '</span>' : '';
    var tr = wordTr(sample, TR_LANG);
    return stepHeader('D', 'Turn your words into practice') +
      '<p class="note demo-sec-sub">From saved vocabulary the app builds these outputs — try the mini previews.</p>' +
      '<div class="demo-practice-grid">' +
        '<div class="demo-practice-card card">' +
          '<p class="seclbl">Personal exam / gap-fill</p>' +
          '<p class="demo-practice-ex">' + practiceGap(exam, sample) + '</p>' +
        '</div>' +
        '<div class="demo-practice-card card">' +
          '<p class="seclbl">Flashcards</p>' +
          '<div class="demo-fc-mini' + (state.fcFlipped ? ' flipped' : '') + '" id="demoFcMini" tabindex="0" role="button" aria-label="Flip flashcard">' +
            '<div class="demo-fc-front">' +
              '<button type="button" class="demo-speak" id="btnSpeak" aria-label="Listen">🔊</button>' +
              artHtml + '<span class="demo-fc-word">' + esc(sample.word) + '</span>' +
              '<span class="fc-flip-hint">Tap to flip → translation</span>' +
            '</div>' +
            '<div class="demo-fc-back">' + esc(tr) + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="demo-practice-card card">' +
          '<p class="seclbl">Matching game</p>' +
          '<p class="demo-practice-ex demo-match">' + practiceMatch(exam) + '</p>' +
        '</div>' +
        '<div class="demo-practice-card card">' +
          '<p class="seclbl">Phrase of the day</p>' +
          '<p class="demo-practice-ex demo-phrase">' + practicePhrase(exam, sample) + '</p>' +
        '</div>' +
      '</div>';
  }

  function renderSectionE(exam){
    var skill = SKILL[exam.lang] || SKILL.de;
    var bars = skill.bars || [];
    var plan = skill.plan || [];
    var barsHtml = bars.map(function(b){
      return '<div class="demo-mastery-row">' +
        '<span class="demo-mastery-lbl">' + esc(b.label) + '</span>' +
        '<div class="demo-mastery-track" role="progressbar" aria-valuenow="' + b.pct + '" aria-valuemin="0" aria-valuemax="100">' +
          '<div class="demo-mastery-fill demo-mastery-fill--' + b.tone + '" style="width:' + b.pct + '%"></div></div>' +
        '<span class="demo-mastery-pct">' + b.pct + '%</span></div>';
    }).join('');
    var planHtml = plan.map(function(row){
      var tagCls = row.tag === 'weak' ? 'demo-plan-tag--weak' : 'demo-plan-tag--review';
      var tagLbl = row.tag === 'weak' ? '70% focus' : '30% review';
      return '<div class="demo-plan-row">' +
        '<span class="demo-plan-day">' + esc(row.day) + '</span>' +
        '<span class="demo-plan-text">' + esc(row.text) + '</span>' +
        '<span class="demo-plan-tag ' + tagCls + '">' + tagLbl + '</span></div>';
    }).join('');
    var grammar = MASTERY[exam.lang] || MASTERY.de;
    var grammarHtml = grammar.map(function(b){
      return '<div class="demo-mastery-row demo-mastery-row--sm">' +
        '<span class="demo-mastery-lbl">' + esc(b.label) + '</span>' +
        '<div class="demo-mastery-track"><div class="demo-mastery-fill demo-mastery-fill--' + b.tone + '" style="width:' + b.pct + '%"></div></div>' +
        '<span class="demo-mastery-pct">' + b.pct + '%</span></div>';
    }).join('');
    return stepHeader('E', 'Spot weaknesses · get a plan') +
      '<p class="note demo-sec-sub">Sample dashboard — the app tracks skills &amp; grammar tags from your mistakes.</p>' +
      '<div class="card demo-weakness-panel">' +
        '<p class="seclbl">Skill breakdown</p>' + barsHtml +
        '<p class="seclbl" style="margin-top:14px">Grammar topics</p>' + grammarHtml +
      '</div>' +
      '<div class="card demo-plan-panel">' +
        '<p class="seclbl">This week · 70% weak areas / 30% review</p>' +
        '<div class="demo-plan-list">' + planHtml + '</div>' +
        '<p class="note demo-mastery-focus">New content respects a cooldown — you won&apos;t see the same exam items again for 15 days.</p>' +
      '</div>';
  }

  function renderSectionF(exam){
    return stepHeader('F', 'Unlock the full path') +
      '<div class="demo-reg-block">' +
        '<h2 class="h2">Create a free account to unlock the complete loop</h2>' +
        '<p class="demo-reg-lede">Full exams for Goethe, Cambridge and DELE · cloud sync · weakness plans · no card required on free tier.</p>' +
        '<div class="demo-mode-pair">' +
          '<div class="demo-mode-card">' +
            '<p class="demo-mode-name">Exam mode</p>' +
            '<p class="demo-mode-desc">Timed, official conditions — like test day.</p>' +
          '</div>' +
          '<div class="demo-mode-card">' +
            '<p class="demo-mode-name">Practice mode</p>' +
            '<p class="demo-mode-desc">Look up words, save vocabulary, learn at your pace.</p>' +
          '</div>' +
        '</div>' +
        '<a class="btn btn-primary" href="/app.html?auth=register">Create free account →</a>' +
        '<span class="demo-reg-sm">Also try the live app: <a href="/app.html">Open LexiCoil</a></span>' +
      '</div>';
  }

  function renderDemo(){
    var exam = state.exam;
    if (!exam) return;
    root.innerHTML =
      '<button type="button" class="btn btn-secondary" id="btnBack" style="margin-bottom:8px">← Choose another level</button>' +
      '<div class="card accent">' +
        '<p class="kicker">Your goal</p>' +
        '<p class="h2">' + esc(exam.certificate) + '</p>' +
        '<p class="goal-sub">' + esc(exam.board) + ' · ' + esc(exam.level) + ' · ' + esc(exam.topic) + '</p>' +
      '</div>' +
      '<section class="demo-journey-section">' + renderSectionB(exam) + '</section>' +
      '<section class="demo-journey-section">' + renderSectionC(exam) + '</section>' +
      '<section class="demo-journey-section">' + renderSectionD(exam) + '</section>' +
      '<section class="demo-journey-section">' + renderSectionE(exam) + '</section>' +
      '<section class="demo-journey-section">' + renderSectionF(exam) + '</section>';

    document.getElementById('btnBack').addEventListener('click', function(){
      state.exam = null;
      renderPick();
    });

    root.querySelectorAll('.passage .w').forEach(function(el){
      function open(){ state.popWord = el.dataset.word; state.popTrLang = TR_LANG; renderDemo(); }
      el.addEventListener('click', open);
      el.addEventListener('keydown', function(e){ if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });
    });

    root.querySelectorAll('[data-trlang]').forEach(function(btn){
      btn.addEventListener('click', function(){ state.popTrLang = btn.dataset.trlang; renderDemo(); });
    });

    root.querySelectorAll('[data-reveal]').forEach(function(btn){
      btn.addEventListener('click', function(){ state.revealed[btn.dataset.reveal] = true; renderDemo(); });
    });

    root.querySelectorAll('[data-task-reveal]').forEach(function(btn){
      btn.addEventListener('click', function(){ state.taskRevealed[btn.dataset.taskReveal] = true; renderDemo(); });
    });

    var saveBtn = document.getElementById('btnSaveWord');
    if (saveBtn) {
      saveBtn.addEventListener('click', function(){
        var meta = getMarkable(state.popWord);
        if (!meta) return;
        saveWord({
          word: meta.word,
          lang: exam.lang,
          gender: meta.gender,
          pos: meta.pos,
          translations: meta.translations,
          source: exam.id,
          savedAt: new Date().toISOString()
        });
        renderDemo();
      });
    }
    var closePop = document.getElementById('btnClosePop');
    if (closePop) closePop.addEventListener('click', function(){ state.popWord = null; renderDemo(); });

    var fc = document.getElementById('demoFcMini');
    if (fc) fc.addEventListener('click', function(e){
      if (e.target.closest('.demo-speak')) return;
      state.fcFlipped = !state.fcFlipped;
      fc.classList.toggle('flipped', state.fcFlipped);
    });
    var speakBtn = document.getElementById('btnSpeak');
    if (speakBtn) {
      speakBtn.addEventListener('click', function(e){
        e.stopPropagation();
        speakWord(sampleWord(exam).word, exam.lang);
      });
    }
  }

  parseQuery();
  if (state.view === 'pick' && new URLSearchParams(location.search).has('lang') && isOpenCell(state.lang, state.level)) {
    startDemo();
  } else {
    renderPick();
  }
})();

</script>
</body>
</html>
