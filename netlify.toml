[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."claude-chat"]
  timeout = 60

[build]
  publish = "."
  environment = { NODE_VERSION = "20" }

# Apex to www (configure lexicoil.com + www.lexicoil.com in Netlify Domain management)
[[redirects]]
  from = "https://lexicoil.com/*"
  to = "https://www.lexicoil.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://lexicoil.com/*"
  to = "https://www.lexicoil.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/oral"
  to = "/oral.html"
  status = 200

[[redirects]]
  from = "/confirmacion"
  to = "/confirmacion.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "microphone=(self), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://esm.sh https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.anthropic.com https://api.stripe.com https://*.supabase.co https://esm.sh; frame-src https://checkout.stripe.com https://js.stripe.com"
